# Amazon Beauty Dataset Configuration
# Product reviews and ratings from Amazon Beauty category
# Commonly used for evaluating recommendation models

# Dataset identifier
dataset: amazon-beauty

# Data loading
load_col:
  inter: [user_id, item_id, rating, timestamp]

# Field configuration
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# Filtering (implicit feedback conversion)
val_interval:
  rating: "[4,inf)"

# Data processing
min_user_inter_num: 5
min_item_inter_num: 5

# Sequential model settings
MAX_ITEM_LIST_LENGTH: 50

# Evaluation
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: TO
  mode: full
