# MovieLens 100K Dataset Configuration
# Classic benchmark dataset for recommendation systems
# ~100,000 ratings from 943 users on 1,682 movies

# Dataset identifier
dataset: ml-100k

# Data loading
load_col:
  inter: [user_id, item_id, rating, timestamp]

# Field configuration
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# Filtering (implicit feedback conversion)
val_interval:
  rating: "[3,inf)"

# Data processing
min_user_inter_num: 5
min_item_inter_num: 5

# Sequential model settings
MAX_ITEM_LIST_LENGTH: 50

# Evaluation
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: TO
  mode: full
