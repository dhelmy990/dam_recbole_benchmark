# SASRec (Self-Attentive Sequential Recommendation) Configuration
# Paper: Self-Attentive Sequential Recommendation (ICDM 2018)
# Model Type: Sequential / Transformer-based

# Model architecture
embedding_size: 64
hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: gelu
layer_norm_eps: 1e-12

# Loss function
loss_type: CE

# No negative sampling for CE loss
train_neg_sample_args: ~

# Sequence settings
MAX_ITEM_LIST_LENGTH: 50

# Optimizer settings
learning_rate: 0.001
weight_decay: 0.0

# Training
train_batch_size: 2048
